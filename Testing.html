<!-- HTML -->
<label for="toggle">Show More Info</label>
<input type="checkbox" id="toggle">

<div class="hidden-text">
  This text was hidden, but now you can see it!
</div>

<style>
  /* 1. Hide the text by default */
  .hidden-text {
    display: none;
    padding: 10px;
    background: #f0f0f0;
    margin-top: 5px;
  }

  /* 2. Show the text when checkbox is checked */
  #toggle:checked ~ .hidden-text {
    display: block;
  }
</style>
